<td
  style="vertical-align: top; width: 34%; padding-right: 20px"
  [style.padding-right]="isLastItem ? '0' : '20px'"
  [style.width]="isFirstItem ? '34%' : '33%'"
>
  @if (title) {
    <p style="margin: 0 0 4px 0; font-size: 13px">
      <strong>{{ title }}</strong>
    </p>
  }

  @if (name) {
    <p style="margin: 0; font-weight: 600; font-size: 13px">
      {{ name }}
    </p>
  }

  @if (description?.length) {
    @for (line of description; track line) {
      <p style="margin: 0; color: #555; font-size: 13px">
        {{ line }}
      </p>
    }
  }
</td>
