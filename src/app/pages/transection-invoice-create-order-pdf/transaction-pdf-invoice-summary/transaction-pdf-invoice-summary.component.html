@if (invoiceSummaryData) {
  <td style="vertical-align: top; width: 45%" #TransactionPDFInvoiceSummary>
    <h1
      style="font-size: 20px; margin: 0 0 10px 0; color: #000; font-weight: 700"
    >
      {{ invoiceSummaryData.title }}
    </h1>

    @if (invoiceSummaryData.data?.length) {
      @for (item of invoiceSummaryData.data; track item?.label) {
        <p style="margin: 2px 0; font-size: 12px; display: flex; gap: 10px">
          <strong style="width: 80px">{{ item.label }}</strong>
          <span style="color: #333333">{{ item.value }}</span>
        </p>
      }
    }
  </td>
}
