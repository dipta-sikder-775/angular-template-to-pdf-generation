@if (invoiceInstallmentTableData?.length) {
  <div style="margin-bottom: 30px">
    <p
      style="
        margin: 0 0 8px 0;
        font-size: 13px;
        font-weight: 700;
        padding: 7px 10px;
        border-radius: 5px;
        background: #f3f4f5;
      "
    >
      Instalment Breakdown
    </p>

    <dynamic-custom-table
      [columns]="invoiceInstallmentTableColumn"
      [data]="invoiceInstallmentTableData"
      [tableStyle]="{ width: '55%', borderCollapse: 'collapse' }"
      [tableHeadRowStyle]="{
        borderBottom: '1px solid #333',
        textAlign: 'left',
        fontSize: '13px',
      }"
      [tableBodyRowStyle]="{ borderBottom: '1px solid #f0f0f0' }"
    />
  </div>
}
