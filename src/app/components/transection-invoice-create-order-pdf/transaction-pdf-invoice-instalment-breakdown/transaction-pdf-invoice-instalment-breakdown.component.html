@if (installments.length) {
  <div style="margin-bottom: 30px">
    <p
      style="
        margin: 0 0 8px 0;
        font-size: 13px;
        font-weight: 700;
        padding: 7px 10px;
        border-radius: 5px;
        background: #f3f4f5;
      "
    >
      Instalment Breakdown
    </p>

    <table style="width: 55%; border-collapse: collapse">
      <thead>
        <tr
          style="
            border-bottom: 1px solid #333;
            text-align: left;
            font-size: 13px;
          "
        >
          <th style="padding: 6px 5px; font-weight: 700">Date</th>
          <th style="padding: 6px 5px; font-weight: 700">Due</th>
          <th style="padding: 6px 5px; font-weight: 700">Status</th>
        </tr>
      </thead>

      <tbody>
        @for (inst of installments; track $index) {
          <tr style="border-bottom: 1px solid #f0f0f0">
            <td style="padding: 6px 5px; font-size: 13px">
              {{ inst.date }}
            </td>
            <td style="padding: 6px 5px; font-size: 13px">£{{ inst.due }}</td>
            <td style="padding: 6px 5px; font-size: 13px">
              {{ inst.status }}
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
}
