<table style="width: 100%; border-collapse: collapse; margin-bottom: 25px">
  <thead>
    <tr style="border-bottom: 1px solid #333; text-align: left; color: #333">
      <th style="padding: 8px 5px; font-weight: 700; font-size: 12px">
        Description
      </th>
      <th
        style="
          padding: 8px 5px;
          text-align: right;
          width: 80px;
          font-weight: 700;
          font-size: 12px;
        "
      >
        Quantity
      </th>
      <th
        style="
          padding: 8px 5px;
          text-align: right;
          width: 90px;
          font-weight: 700;
          font-size: 12px;
        "
      >
        Unit Price
      </th>
      <th
        style="
          padding: 8px 5px;
          text-align: right;
          width: 60px;
          font-weight: 700;
          font-size: 12px;
        "
      >
        VAT
      </th>
      <th
        style="
          padding: 8px 5px;
          text-align: right;
          width: 100px;
          font-weight: 700;
          font-size: 12px;
        "
      >
        Amount GBP
      </th>
    </tr>
  </thead>

  <tbody>
    <tr>
      <td
        colspan="5"
        style="padding: 10px 5px 4px 5px; font-weight: bold; font-size: 12px"
      >
        {{ stockType }} :
      </td>
    </tr>

    @for (item of items; track $index) {
      <tr style="border-bottom: 1px solid #eee">
        <td style="padding: 8px 5px">
          <div style="font-size: 13px; display: flex; gap: 8px">
            @if (item.img) {
              <img style="width: 40px" [src]="item.img" alt="" />
            }
            <div>
              {{ item.description }}
              @if (item.sku) {
                <div style="font-size: 11px; color: #777">
                  Sku: {{ item.sku }}
                </div>
              }
            </div>
          </div>
        </td>
        <td style="padding: 8px 5px; text-align: right; font-size: 12px">
          {{ item.quantity }}
        </td>
        <td style="padding: 8px 5px; text-align: right; font-size: 12px">
          £{{ item.unitPrice }}
        </td>
        <td style="padding: 8px 5px; text-align: right; font-size: 12px">
          {{ item.vat }}
        </td>
        <td style="padding: 8px 5px; text-align: right; font-size: 12px">
          £{{ item.amount }}
        </td>
      </tr>
    }
  </tbody>
</table>

<dynamic-custom-table [columns]="" />
